name: Quality Gate

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: '22'
      run_qa_tests:
        type: boolean
        default: true
      run_pentest:
        type: boolean
        default: true
      qa_runner_path:
        type: string
        default: 'tests/qa/runner-qa.js'
      pentest_runner_path:
        type: string
        default: 'tests/security/runner-pentest.js'
      master_runner_path:
        type: string
        default: 'tests/runner.js'
      server_port:
        type: string
        default: '3001'
      health_endpoint:
        type: string
        default: '/api/health'
      needs_server:
        type: boolean
        default: true
      needs_build:
        type: boolean
        default: true
      run_security_scans:
        type: boolean
        default: true
        description: 'Run Semgrep + OSV-Scanner + Gitleaks (in parallel with the gate job)'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  packages: read
  contents: read

jobs:
  gate:
    name: Build, Test, Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Secrets are passed via `secrets: inherit` from the caller.
    # Any secret set on the calling repo (or inherited from the org) is
    # available here. Empty/missing secrets evaluate to empty string (safe).
    #
    # v7: NODE_AUTH_TOKEN uses secrets.GITHUB_TOKEN (per-run auto-minted
    # repo token). The consumer repo must be added to the npm package's
    # "Manage Actions access" list for this to work. v6's GitHub App token
    # path was abandoned — GitHub Packages npm registry has a legacy access
    # check that doesn't honor cross-repo App installation tokens despite
    # the App being installed on the source repo. Use GITHUB_TOKEN instead.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
      NEXTAUTH_URL: http://localhost:${{ inputs.server_port }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      WEBSITE_GITHUB_REPO: ${{ secrets.WEBSITE_GITHUB_REPO }}
      PORTAL_JWT_SECRET: ${{ secrets.PORTAL_JWT_SECRET }}
      PORTAL_TOTP_ENCRYPTION_KEY: ${{ secrets.PORTAL_TOTP_ENCRYPTION_KEY }}
      API_BASE_URL: http://localhost:${{ inputs.server_port }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci

      - name: Build application
        if: inputs.needs_build
        run: npm run build

      - name: Start server
        if: inputs.needs_server
        run: |
          PORT=${{ inputs.server_port }} npm start &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:${{ inputs.server_port }}${{ inputs.health_endpoint }} > /dev/null 2>&1; then
              echo "Server ready after $((i * 2))s"
              exit 0
            fi
            echo "Waiting for server... attempt $i/30"
          done
          echo "Server failed to start after 60 seconds"
          exit 1

      - name: Generate test auth token
        if: inputs.needs_server
        id: token
        run: |
          if [ -f scripts/generate-test-token.js ]; then
            TOKEN=$(node scripts/generate-test-token.js)
            echo "TEST_SESSION_TOKEN=$TOKEN" >> $GITHUB_OUTPUT
            echo "Auth test token generated"
          else
            echo "No token generator found — skipping"
          fi

      - name: Run QA test suite
        if: inputs.run_qa_tests
        env:
          TEST_SESSION_TOKEN: ${{ steps.token.outputs.TEST_SESSION_TOKEN }}
          API_BASE_URL: http://localhost:${{ inputs.server_port }}
        run: node ${{ inputs.qa_runner_path }} 2>&1

      - name: Run penetration test suite
        if: inputs.run_pentest
        env:
          TEST_SESSION_TOKEN: ${{ steps.token.outputs.TEST_SESSION_TOKEN }}
          API_BASE_URL: http://localhost:${{ inputs.server_port }}
        run: node ${{ inputs.pentest_runner_path }} 2>&1

      - name: Run master test runner
        if: inputs.run_qa_tests
        env:
          TEST_SESSION_TOKEN: ${{ steps.token.outputs.TEST_SESSION_TOKEN }}
          API_BASE_URL: http://localhost:${{ inputs.server_port }}
        run: node ${{ inputs.master_runner_path }} 2>&1

      - name: npm security audit
        run: npm audit --audit-level=critical

      - name: Stop server
        if: always() && inputs.needs_server
        run: kill $SERVER_PID 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: |
            tests/**/*.md
          retention-days: 30

  # ---------------------------------------------------------------- security scanning (added v1.7)
  # Runs in parallel with `gate` for speed. Findings appear in the workflow log.
  # No SARIF upload (would require GHAS / Code Security, which org Free + Team
  # don't include for private repos). When the org acquires Code Security, add
  # `security-events: write` to each job's permissions and append an
  # `actions/upload-sarif` step with `continue-on-error: true` removed.
  #
  # These three jobs are the framework's REQUIRED status-check trio. Once your
  # repo's main branch has run them at least once, upgrade the repo's ruleset
  # from `main-protection-baseline.json` to `main-protection-lite.json` (which
  # adds these as required_status_checks).

  semgrep:
    name: semgrep
    if: inputs.run_security_scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # NOTE: `pull-requests: write` removed — Dependabot's push-event token
      # is read-only on private repos and rejects this permission, causing
      # startup_failure (`jobs: []`). Scanner output goes to workflow logs
      # only; if you want PR comments, post-process the JSON in a separate
      # step that runs only on push events (where `pull-requests: write`
      # actually works), not on pull_request from Dependabot.
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semgrep diff scan (PR) / full scan (push)
        # SECURITY: github.base_ref must come via env: + quoted shell var, not direct
        # ${{ }} interpolation. Direct interpolation is shell-injection-vulnerable per
        # Semgrep rule yaml.github-actions.security.run-shell-injection.
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$GH_EVENT_NAME" == "pull_request" ]]; then
            semgrep ci \
              --config p/ci \
              --config p/owasp-top-ten \
              --config p/react \
              --config p/typescript \
              --config p/javascript \
              --config p/nodejs \
              --config p/secrets \
              --baseline-ref "origin/$GH_BASE_REF" \
              --json --output=semgrep.json || true
          else
            semgrep ci \
              --config p/ci \
              --config p/owasp-top-ten \
              --json --output=semgrep.json || true
          fi

      - name: Report Critical / High findings (advisory, non-blocking)
        # v7.1: non-blocking. Findings surface in workflow log + step summary
        # but do not fail the job. Matches osv-scanner posture. Re-enable
        # blocking by removing `continue-on-error` from this step.
        continue-on-error: true
        run: |
          if [[ -f semgrep.json ]]; then
            high=$(jq '[.results[] | select(.extra.severity=="ERROR" or .extra.severity=="WARNING")] | length' semgrep.json)
            if [[ "$high" -gt 0 ]]; then
              echo "::warning::Semgrep found $high Critical/High findings (advisory — not blocking deploy)"
              jq '.results[] | select(.extra.severity=="ERROR" or .extra.severity=="WARNING") | {check_id, path, message: .extra.message}' semgrep.json
              {
                echo "## Semgrep Findings ($high Critical/High)"
                echo ""
                echo "Findings are advisory and do not block deploy. Triage in a separate PR."
                echo ""
                jq -r '.results[] | select(.extra.severity=="ERROR" or .extra.severity=="WARNING") | "- `\(.check_id)` in `\(.path)`: \(.extra.message | gsub("\n"; " "))"' semgrep.json
              } >> "$GITHUB_STEP_SUMMARY"
              exit 1   # step fails (visible), but continue-on-error keeps the job green
            fi
            echo "no Critical/High findings"
          fi

  osv-scanner:
    name: osv-scanner
    if: inputs.run_security_scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        # google/osv-scanner-action is a monorepo; sub-action lives in /osv-scanner-action.
        # v2 dropped --skip-git (now default behavior).
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5   # TODO: pin to commit SHA
        with:
          scan-args: |-
            --recursive
            --format=json
            --output=osv.json
            ./
        continue-on-error: true   # known vulns surface but don't block PRs; Dependabot is the remediation channel

      - name: Summarize OSV findings
        if: always()
        run: |
          if [[ -f osv.json ]]; then
            count=$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' osv.json 2>/dev/null || echo 0)
            echo "OSV-Scanner found $count vulnerable package versions (see Dependabot for remediation)"
            jq -r '.results[]?.packages[]? | "  \(.package.name)@\(.package.version): \([.vulnerabilities[].id] | join(\",\"))"' osv.json 2>/dev/null | head -30 || true
          fi

  gitleaks:
    name: gitleaks
    if: inputs.run_security_scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks (binary, not Action — Action requires paid org license)
        run: |
          GITLEAKS_VERSION="8.30.1"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/

      - name: Run gitleaks (PR diff or full repo scan, advisory)
        # SECURITY: github.base_ref + event_name via env: + quoted shell vars
        # (avoids run-shell-injection per Semgrep rule).
        # v7.1: non-blocking. Findings surface as a warning + step summary
        # but don't fail the job. Re-enable blocking by removing
        # `continue-on-error` from this step.
        continue-on-error: true
        env:
          GH_EVENT_NAME: ${{ github.event_name }}
          GH_BASE_REF: ${{ github.base_ref }}
        run: |
          set +e
          if [[ "$GH_EVENT_NAME" == "pull_request" ]]; then
            CONFIG_ARG=""
            [ -f .gitleaks.toml ] && CONFIG_ARG="--config=.gitleaks.toml"
            gitleaks protect --source=. --redact $CONFIG_ARG \
              --log-opts="--no-merges origin/$GH_BASE_REF..HEAD"
          else
            CONFIG_ARG=""
            [ -f .gitleaks.toml ] && CONFIG_ARG="--config=.gitleaks.toml"
            gitleaks detect --source=. --redact $CONFIG_ARG
          fi
          rc=$?
          if [[ $rc -eq 1 ]]; then
            echo "::warning::gitleaks found one or more secrets (advisory — not blocking deploy)"
            {
              echo "## Gitleaks Findings"
              echo ""
              echo "Findings are advisory and do not block deploy. Triage in a separate PR — rotate any real secrets, allowlist false positives in \`.gitleaks.toml\`."
              echo ""
              echo "See the workflow log above for redacted finding details."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1   # step fails (visible), but continue-on-error keeps the job green
          fi
          echo "no secrets found"
