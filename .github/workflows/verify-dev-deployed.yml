name: Verify dev deployed (prod-promotion ancestry gate)

# Reusable workflow extracted from consumer ci-cd.yml files in v9.0. The
# bash logic was duplicated across 7 repos (platform + 6 consumers); every
# fix to the recovery message required N PRs. Centralizing it here means
# future fixes propagate to all consumers via a single @vX.Y bump.
#
# Layer 3 of the framework's bypass-prevention model. Refuses to deploy
# to prod unless origin/dev's tip is reachable from main HEAD (i.e.,
# dev → main was merged with "Create a merge commit" so dev_tip is one
# of main HEAD's parents). Squash, rebase, and direct-push to main all
# fail this check by design.
#
# See: https://admin.triarch.dev/ci-cd/firebase-2env-pattern.md
#       §"Promotion merge method — why dev → main must be a merge-commit"

on:
  workflow_call:
    inputs:
      dev_branch:
        description: 'Branch name on origin to check ancestry against. Default: dev'
        required: false
        type: string
        default: 'dev'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Assert ${{ inputs.dev_branch }} tip is in HEAD's ancestry
        run: |
          # The framework's promotion model is dev → main using "Create a merge
          # commit" (NOT squash/rebase). A correct merge-commit on main has
          # parents [old_main_tip, dev_tip], making origin/dev's tip an
          # ancestor of HEAD. This check passes for the supported flow and
          # blocks direct pushes to main (where dev's tip is not reachable
          # from HEAD).
          #
          # The earlier direction (`HEAD ancestor of origin/dev`) required
          # main's commit to literally exist on dev, which forced a manual
          # "merge main back into dev" recovery step on every prod promotion
          # regardless of merge method. Flipped 2026-05-15 per platform v2.13.10.
          git fetch origin "${{ inputs.dev_branch }}"
          if ! git merge-base --is-ancestor "origin/${{ inputs.dev_branch }}" HEAD; then
            echo "::error::Refusing to deploy to prod: origin/${{ inputs.dev_branch }} tip ($(git rev-parse origin/${{ inputs.dev_branch }})) is not reachable from HEAD ($(git rev-parse HEAD))."
            echo "::error::${{ inputs.dev_branch }} → main must be merged using 'Create a merge commit' so dev's tip becomes a parent of main HEAD."
            echo "::error::Recovery if you already squash-merged (pick ONE):"
            echo "::error::  A) Re-merge ${{ inputs.dev_branch }} → main locally with --no-ff and push: git checkout main && git merge --no-ff origin/${{ inputs.dev_branch }} -m 'merge ${{ inputs.dev_branch }} (post-squash repair)' && git push origin main"
            echo "::error::  B) Force-push ${{ inputs.dev_branch }} to match main: git checkout ${{ inputs.dev_branch }} && git reset --hard origin/main && git push --force-with-lease origin ${{ inputs.dev_branch }}   (requires temporarily disabling the dev-protection ruleset's non_fast_forward rule)"
            echo "::error::Do NOT 'git merge origin/main --no-ff' on ${{ inputs.dev_branch }} — that creates a merge commit on ${{ inputs.dev_branch }} that is newer than main HEAD and the check still fails."
            exit 1
          fi
          echo "Verified: origin/${{ inputs.dev_branch }} is an ancestor of HEAD — safe to promote to prod."
