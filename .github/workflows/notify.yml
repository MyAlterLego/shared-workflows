name: Deploy Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "Deploy result: success, failure, cancelled, skipped"
      project_name:
        required: true
        type: string
      app_url:
        type: string
        default: ''
      version:
        type: string
        default: ''
      commit_message:
        type: string
        default: ''
      # ── FAH rollout wait (opt-in) ───────────────────────────────────────────
      # When wait_for_fah is true, the workflow polls Firebase App Hosting for
      # the most recent rollout on the given backend until it reaches a
      # terminal state (success / failure / cancelled). The Slack notification
      # is sent AFTER that — so the message reflects the actual deploy outcome
      # rather than just "GH workflow completed".
      #
      # Requires FIREBASE_SA_KEY as an inherited secret on the calling repo.
      wait_for_fah:
        type: boolean
        default: false
      app_hosting_backend:
        type: string
        default: ''
      firebase_project_id:
        type: string
        default: ''
      fah_timeout_seconds:
        type: number
        default: 600
      # ── Email fallback recipients (used when Slack delivery fails) ─────────
      # Both default to the triarchsecurity.com support address. Override on
      # the calling repo if a different inbox should receive failure alerts.
      # Requires RESEND_API_KEY as an inherited secret to actually send mail;
      # the step is a silent no-op when the secret is absent.
      alert_from_email:
        type: string
        default: 'alerts@triarchsecurity.com'
      alert_to_email:
        type: string
        default: 'support@triarchsecurity.com'

jobs:
  notify:
    name: Send Notification
    runs-on: ubuntu-latest

    steps:
      # ── FAH rollout wait (opt-in via inputs.wait_for_fah) ─────────────────
      # Polls Firebase App Hosting for the most recent rollout on the given
      # backend until it reaches a terminal state. Overrides the inherited
      # `status` input so Slack reflects the actual deploy outcome rather
      # than the GH workflow conclusion.
      # All FAH-wait steps use continue-on-error so they can NEVER break
      # the Slack notification. The wait is a nice-to-have signal — if any
      # part of it (auth, CLI install, polling) fails, we fall back to the
      # GH workflow's `status` input and Slack still fires.
      - name: Authenticate to Google Cloud
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        continue-on-error: true
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        continue-on-error: true
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        continue-on-error: true
        run: npm install -g firebase-tools

      - name: Wait for FAH rollout
        id: fah-wait
        if: inputs.wait_for_fah && inputs.firebase_project_id != '' && inputs.status != 'failure'
        continue-on-error: true
        env:
          BACKEND: ${{ inputs.app_hosting_backend != '' && inputs.app_hosting_backend || inputs.firebase_project_id }}
          PROJECT: ${{ inputs.firebase_project_id }}
          TIMEOUT: ${{ inputs.fah_timeout_seconds }}
        run: |
          # No `set -e` — every command is allowed to fail without aborting
          # the script. Each potential-failure path uses `|| true` and we
          # always `exit 0` at the end. This is "best-effort" telemetry.
          set +e

          echo "Warmup: waiting 15s for FAH to enqueue the new rollout..."
          sleep 15

          # The firebase CLI's --json flag isn't supported on all subcommands.
          # Try JSON first; if jq parse fails, fall back to text parsing.
          fetch_rollouts() {
            firebase apphosting:rollouts:list "$BACKEND" --project "$PROJECT" --json 2>/dev/null
          }
          fetch_rollouts_text() {
            firebase apphosting:rollouts:list "$BACKEND" --project "$PROJECT" 2>/dev/null
          }

          # Try JSON path
          ROLLOUT=$(fetch_rollouts | jq -r '.[0].name // empty' 2>/dev/null)

          # Fall back to text parsing — first non-header line, first col is the name
          if [ -z "$ROLLOUT" ]; then
            ROLLOUT=$(fetch_rollouts_text \
              | grep -E '^projects/' \
              | head -1 \
              | awk '{print $1}')
          fi

          if [ -z "$ROLLOUT" ]; then
            echo "::warning::Could not identify FAH rollout for $BACKEND (firebase CLI may not support apphosting:rollouts on this version, or backend has no rollouts) — proceeding without wait"
            echo "FAH_STATE=UNKNOWN" >> $GITHUB_OUTPUT
            echo "FAH_DURATION=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Tracking rollout: $(basename "$ROLLOUT")"

          START=$(date +%s)
          while true; do
            ELAPSED=$(($(date +%s) - START))
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::warning::FAH rollout did not finish within ${TIMEOUT}s"
              echo "FAH_STATE=TIMEOUT" >> $GITHUB_OUTPUT
              echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
              exit 0
            fi

            STATE=$(fetch_rollouts \
              | jq -r --arg N "$ROLLOUT" '.[] | select(.name == $N) | .state // "UNKNOWN"' 2>/dev/null)
            if [ -z "$STATE" ] || [ "$STATE" = "UNKNOWN" ]; then
              # Text fallback — locate the rollout line, second column is state
              STATE=$(fetch_rollouts_text \
                | awk -v r="$ROLLOUT" '$1 == r { print $2 }')
            fi
            STATE="${STATE:-UNKNOWN}"

            case "$STATE" in
              STATE_SUCCESS|SUCCESS|SUCCEEDED)
                echo "✓ Rollout SUCCESS in ${ELAPSED}s"
                echo "FAH_STATE=SUCCESS" >> $GITHUB_OUTPUT
                echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
                exit 0
                ;;
              STATE_FAILED|FAILED|STATE_CANCELLED|CANCELLED)
                echo "::warning::Rollout finished with state $STATE after ${ELAPSED}s"
                echo "FAH_STATE=FAILED" >> $GITHUB_OUTPUT
                echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
                exit 0
                ;;
              *)
                echo "  state=$STATE elapsed=${ELAPSED}s — waiting"
                sleep 20
                ;;
            esac
          done
          # Unreachable but defensive
          exit 0

      - name: Compute final status
        id: final-status
        env:
          INPUT_STATUS: ${{ inputs.status }}
          FAH_STATE: ${{ steps.fah-wait.outputs.FAH_STATE }}
        run: |
          # If FAH wait was performed, FAH outcome wins over GH workflow conclusion.
          # SUCCESS → success, FAILED → failure, anything else → pass through input.
          if [ -n "$FAH_STATE" ] && [ "$FAH_STATE" != "UNKNOWN" ]; then
            case "$FAH_STATE" in
              SUCCESS) FINAL=success ;;
              FAILED)  FINAL=failure ;;
              TIMEOUT) FINAL=timeout ;;
              *)       FINAL="$INPUT_STATUS" ;;
            esac
          else
            FINAL="$INPUT_STATUS"
          fi
          echo "STATUS=$FINAL" >> $GITHUB_OUTPUT
          echo "Final status: $FINAL (input=$INPUT_STATUS, fah=$FAH_STATE)"

      - name: Fetch Slack credentials from CRDB
        id: slack-creds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — cannot fetch Slack credentials from CRDB"
            echo "BOT_TOKEN=" >> $GITHUB_OUTPUT
            echo "CHANNEL_ID=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query settings table for slack credentials
          BOT_TOKEN=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_bot_token'" 2>/dev/null || echo "")
          CHANNEL_ID=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_channel_id'" 2>/dev/null || echo "")

          # Mask the bot token so it doesn't appear in logs
          if [ -n "$BOT_TOKEN" ]; then
            echo "::add-mask::$BOT_TOKEN"
          fi

          echo "BOT_TOKEN=$BOT_TOKEN" >> $GITHUB_OUTPUT
          echo "CHANNEL_ID=$CHANNEL_ID" >> $GITHUB_OUTPUT

          if [ -n "$BOT_TOKEN" ] && [ -n "$CHANNEL_ID" ]; then
            echo "Slack Bot credentials loaded from CRDB"
          else
            echo "Slack Bot credentials not found in CRDB — will fall back to webhook"
          fi

      - name: Send Slack notification
        id: slack-send
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ steps.slack-creds.outputs.BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ steps.slack-creds.outputs.CHANNEL_ID }}
          INPUT_STATUS: ${{ steps.final-status.outputs.STATUS || inputs.status }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
          INPUT_PROJECT_NAME: ${{ inputs.project_name }}
          INPUT_APP_URL: ${{ inputs.app_url }}
          FAH_DURATION: ${{ steps.fah-wait.outputs.FAH_DURATION }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          # Format optional FAH rollout duration (set when wait_for_fah opted in)
          DURATION_SUFFIX=""
          if [ -n "$FAH_DURATION" ] && [ "$FAH_DURATION" != "0" ]; then
            MINS=$((FAH_DURATION / 60))
            SECS=$((FAH_DURATION % 60))
            if [ "$MINS" -gt 0 ]; then
              DURATION_SUFFIX=" in ${MINS}m${SECS}s"
            else
              DURATION_SUFFIX=" in ${SECS}s"
            fi
          fi

          if [ "$INPUT_STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS_TEXT="deployed successfully${DURATION_SUFFIX}"
            COLOR="#2ecc71"
          elif [ "$INPUT_STATUS" = "failure" ]; then
            EMOJI=":x:"
            STATUS_TEXT="deploy failed${DURATION_SUFFIX}"
            COLOR="#e74c3c"
          elif [ "$INPUT_STATUS" = "cancelled" ]; then
            EMOJI=":no_entry_sign:"
            STATUS_TEXT="deploy cancelled"
            COLOR="#f39c12"
          elif [ "$INPUT_STATUS" = "timeout" ]; then
            EMOJI=":hourglass:"
            STATUS_TEXT="deploy still in progress (poll timed out)"
            COLOR="#f39c12"
          else
            EMOJI=":warning:"
            STATUS_TEXT="deploy ${INPUT_STATUS}"
            COLOR="#95a5a6"
          fi

          # Build version line
          VERSION_LINE=""
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "unknown" ]; then
            VERSION_LINE="\`${INPUT_VERSION}\`"
          fi

          # Build commit message line (first line only, truncated, shell-safe)
          COMMIT_MSG="${INPUT_COMMIT_MESSAGE:-$HEAD_COMMIT_MESSAGE}"
          COMMIT_LINE=$(printf '%s' "$COMMIT_MSG" | head -1 | cut -c1-100 | sed 's/["\`$\\]/\\&/g')

          # ── Try Slack Bot API first (supports threading) ──
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            # Build fields array
            FIELDS='['
            if [ -n "$VERSION_LINE" ]; then
              FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Version*\n${VERSION_LINE}\"},"
            fi
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Branch*\n\`${GH_REF_NAME}\`\"},"
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Commit*\n<${GH_COMMIT_URL}|${GH_SHA:0:7}>\"}"
            FIELDS="${FIELDS}]"

            # Build blocks
            BLOCKS='[
              {"type":"section","text":{"type":"mrkdwn","text":"'"${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"'"}},
              {"type":"section","fields":'"${FIELDS}"'}'

            # Add commit message context
            if [ -n "$COMMIT_LINE" ]; then
              COMMIT_ESCAPED=$(echo "$COMMIT_LINE" | sed 's/"/\\"/g' | sed "s/'/\\\\'/g")
              BLOCKS="${BLOCKS},"'{"type":"context","elements":[{"type":"mrkdwn","text":"'"${COMMIT_ESCAPED}"'"}]}'
            fi

            # Add app URL + actions link
            ACTIONS='{"type":"actions","elements":['
            ACTIONS_ITEMS=""
            if [ -n "${INPUT_APP_URL}" ]; then
              ACTIONS_ITEMS='{"type":"button","text":{"type":"plain_text","text":"View Site"},"url":"'"${INPUT_APP_URL}"'"}'
            fi
            ACTIONS_ITEMS="${ACTIONS_ITEMS:+${ACTIONS_ITEMS},}"'{"type":"button","text":{"type":"plain_text","text":"View Run"},"url":"'"${GH_RUN_URL}"'"}'
            ACTIONS="${ACTIONS}${ACTIONS_ITEMS}]}"
            BLOCKS="${BLOCKS},${ACTIONS}]"

            # Post initial message — capture body + status; -sS keeps stderr, no -f so we still
            # get a body on non-2xx for debugging. We trust the Slack `"ok":true` field.
            RESPONSE=$(curl -sS --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"blocks\":${BLOCKS},\"text\":\"${EMOJI} ${INPUT_PROJECT_NAME} ${STATUS_TEXT}\"}" 2>&1)

            if echo "$RESPONSE" | grep -q '"ok":true'; then
              # Extract thread_ts for reply
              THREAD_TS=$(echo "$RESPONSE" | grep -oP '"ts"\s*:\s*"\K[^"]+' | head -1)

              # Post thread reply with deployment confirmation (best-effort, doesn't affect status)
              if [ -n "$THREAD_TS" ] && [ "${INPUT_STATUS}" = "success" ]; then
                THREAD_TEXT=":firebase: Firebase deployment confirmed for *${INPUT_PROJECT_NAME}*"
                if [ -n "$VERSION_LINE" ]; then
                  THREAD_TEXT="${THREAD_TEXT} ${VERSION_LINE}"
                fi
                if [ -n "${INPUT_APP_URL}" ]; then
                  THREAD_TEXT="${THREAD_TEXT}\n:globe_with_meridians: Live at <${INPUT_APP_URL}>"
                fi

                curl -sf --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
                  -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"thread_ts\":\"${THREAD_TS}\",\"text\":\"$(echo "$THREAD_TEXT" | sed 's/"/\\"/g')\"}" > /dev/null 2>&1 || echo "::warning::Thread reply failed"
              fi

              echo "Sent via Slack Bot API (credentials from CRDB) with thread reply"
              echo "DELIVERY=delivered" >> $GITHUB_OUTPUT
              echo "FAILURE_REASON=" >> $GITHUB_OUTPUT
            else
              # Slack rejected the post (ok:false), or curl never reached Slack
              SLACK_ERR=$(echo "$RESPONSE" | grep -oP '"error"\s*:\s*"\K[^"]+' | head -1)
              SLACK_ERR="${SLACK_ERR:-no_response_or_network_error}"
              echo "::warning::Slack Bot API rejected the post: $SLACK_ERR"
              echo "DELIVERY=failed" >> $GITHUB_OUTPUT
              echo "FAILURE_REASON=bot_api_rejected:$SLACK_ERR" >> $GITHUB_OUTPUT
            fi
          elif [ -n "$SLACK_WEBHOOK_URL" ]; then
            # ── Fallback: Slack Incoming Webhook (no threading) ──
            TEXT="${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"

            if [ -n "$VERSION_LINE" ]; then
              TEXT="${TEXT}  |  ${VERSION_LINE}"
            fi

            if [ -n "$COMMIT_LINE" ]; then
              TEXT="${TEXT}\n> ${COMMIT_LINE}"
            fi

            TEXT="${TEXT}\nBranch: \`${GH_REF_NAME}\`  |  <${GH_RUN_URL}|View run>"

            if [ -n "${INPUT_APP_URL}" ]; then
              TEXT="${TEXT}  |  <${INPUT_APP_URL}|View site>"
            fi

            HTTP_CODE=$(curl -sS --max-time 10 -o /dev/null -w "%{http_code}" \
              -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"$(echo "$TEXT" | sed 's/"/\\"/g')\"}" 2>/dev/null || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "Sent via Incoming Webhook (add slack_bot_token + slack_channel_id to CRDB settings for rich notifications with threading)"
              echo "DELIVERY=delivered" >> $GITHUB_OUTPUT
              echo "FAILURE_REASON=" >> $GITHUB_OUTPUT
            else
              echo "::warning::Slack webhook notification failed (http=$HTTP_CODE)"
              echo "DELIVERY=failed" >> $GITHUB_OUTPUT
              echo "FAILURE_REASON=webhook_http_$HTTP_CODE" >> $GITHUB_OUTPUT
            fi
          else
            echo "::warning::No Slack credentials found — skipping notification"
            echo "Add slack_bot_token + slack_channel_id to CRDB settings table, or set SLACK_WEBHOOK_URL as a GitHub secret"
            echo "DELIVERY=failed" >> $GITHUB_OUTPUT
            echo "FAILURE_REASON=missing_credentials" >> $GITHUB_OUTPUT
          fi

      # ── Email fallback when Slack delivery actually fails ────────────────
      # Sends a plain HTML email to the configured alert recipient via Resend
      # ONLY when Slack accepted but rejected (bot_api_rejected:*) or the
      # webhook returned non-200 (webhook_http_*) — i.e. real delivery failures.
      #
      # Explicitly DOES NOT send when FAILURE_REASON == 'missing_credentials'
      # because that's a configuration gap (no slack creds in CRDB or repo
      # secrets), not a delivery failure. Sending email every deploy in that
      # case spams the alert inbox until the config is fixed; consumers can
      # tell from CI logs that Slack creds are missing.
      #
      # Skips silently if RESEND_API_KEY is not set so consumer repos that
      # haven't onboarded Resend keep working unchanged.
      - name: Send email on Slack failure
        if: steps.slack-send.outputs.DELIVERY == 'failed' && steps.slack-send.outputs.FAILURE_REASON != 'missing_credentials'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ inputs.alert_from_email }}
          ALERT_TO_EMAIL: ${{ inputs.alert_to_email }}
          INPUT_STATUS: ${{ steps.final-status.outputs.STATUS || inputs.status }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PROJECT_NAME: ${{ inputs.project_name }}
          INPUT_APP_URL: ${{ inputs.app_url }}
          FAILURE_REASON: ${{ steps.slack-send.outputs.FAILURE_REASON }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "::warning::Slack delivery failed (reason: $FAILURE_REASON), but RESEND_API_KEY is not set on this repo — skipping email fallback"
            echo "Add RESEND_API_KEY as a GitHub secret on $GH_REPOSITORY (or org-wide) to enable email alerts to $ALERT_TO_EMAIL"
            exit 0
          fi

          SUBJECT="[ALERT] Slack notify failed for ${INPUT_PROJECT_NAME} ${INPUT_VERSION:-(no version)} — ${FAILURE_REASON}"

          HTML="<h2>Deploy notification failed to reach Slack</h2>
          <p><strong>Project:</strong> ${INPUT_PROJECT_NAME}</p>
          <p><strong>Version:</strong> ${INPUT_VERSION:-(none)}</p>
          <p><strong>Deploy status (per CI):</strong> ${INPUT_STATUS}</p>
          <p><strong>Slack failure reason:</strong> <code>${FAILURE_REASON}</code></p>
          <p><strong>Repository:</strong> <a href=\"${GH_RUN_URL%/actions/*}\">${GH_REPOSITORY}</a></p>
          <p><strong>Branch:</strong> <code>${GH_REF_NAME}</code></p>
          <p><strong>Commit:</strong> <a href=\"${GH_COMMIT_URL}\">${GH_SHA:0:7}</a></p>
          <p><strong>Workflow run:</strong> <a href=\"${GH_RUN_URL}\">View run</a></p>"

          if [ -n "${INPUT_APP_URL}" ]; then
            HTML="${HTML}<p><strong>Site:</strong> <a href=\"${INPUT_APP_URL}\">${INPUT_APP_URL}</a></p>"
          fi

          HTML="${HTML}<hr><p style=\"color:#666;font-size:12px\">Sent because the Slack notification step in shared-workflows/notify.yml could not deliver. Investigate and resolve the underlying cause (missing creds, webhook revoked, etc.) so future deploys notify normally.</p>"

          # Build payload with jq to handle quoting safely
          PAYLOAD=$(jq -n \
            --arg from "$ALERT_FROM_EMAIL" \
            --arg to "$ALERT_TO_EMAIL" \
            --arg subject "$SUBJECT" \
            --arg html "$HTML" \
            '{from: $from, to: [$to], subject: $subject, html: $html}')

          HTTP_CODE=$(curl -sS --max-time 10 -o /tmp/resend-resp.json -w "%{http_code}" \
            -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
            echo "Email alert sent to $ALERT_TO_EMAIL via Resend (Slack reason: $FAILURE_REASON)"
          else
            echo "::error::Resend email API returned $HTTP_CODE — alert NOT delivered. Body:"
            cat /tmp/resend-resp.json 2>/dev/null || true
            # Don't fail the job — notification step is best-effort by design
          fi
