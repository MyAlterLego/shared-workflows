name: Deploy Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "Deploy result: success, failure, cancelled, skipped"
      project_name:
        required: true
        type: string
      app_url:
        type: string
        default: ''
      version:
        type: string
        default: ''

jobs:
  notify:
    name: Send Notification
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ "${{ inputs.status }}" = "success" ]; then
            EMOJI=":white_check_mark:"
            COLOR="good"
          else
            EMOJI=":x:"
            COLOR="danger"
          fi

          TEXT="${EMOJI} *${{ inputs.project_name }}* deploy: *${{ inputs.status }}*"

          if [ -n "${{ inputs.version }}" ]; then
            TEXT="${TEXT}\nVersion: \`${{ inputs.version }}\`"
          fi

          if [ -n "${{ inputs.app_url }}" ]; then
            TEXT="${TEXT}\n<${{ inputs.app_url }}|View live site>"
          fi

          TEXT="${TEXT}\nBranch: \`${{ github.ref_name }}\` | <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"

          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -sf --max-time 10 -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"$(echo "$TEXT" | sed 's/"/\\"/g')\"}" || echo "::warning::Slack notification failed"
          else
            echo "::warning::SLACK_WEBHOOK_URL not set — skipping notification"
            echo "Would have sent: $TEXT"
          fi
