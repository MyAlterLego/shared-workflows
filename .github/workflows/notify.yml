name: Deploy Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "Deploy result: success, failure, cancelled, skipped"
      project_name:
        required: true
        type: string
      app_url:
        type: string
        default: ''
      version:
        type: string
        default: ''
      commit_message:
        type: string
        default: ''

jobs:
  notify:
    name: Send Notification
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Slack credentials from CRDB
        id: slack-creds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — cannot fetch Slack credentials from CRDB"
            echo "BOT_TOKEN=" >> $GITHUB_OUTPUT
            echo "CHANNEL_ID=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query settings table for slack credentials
          BOT_TOKEN=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_bot_token'" 2>/dev/null || echo "")
          CHANNEL_ID=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_channel_id'" 2>/dev/null || echo "")

          # Mask the bot token so it doesn't appear in logs
          if [ -n "$BOT_TOKEN" ]; then
            echo "::add-mask::$BOT_TOKEN"
          fi

          echo "BOT_TOKEN=$BOT_TOKEN" >> $GITHUB_OUTPUT
          echo "CHANNEL_ID=$CHANNEL_ID" >> $GITHUB_OUTPUT

          if [ -n "$BOT_TOKEN" ] && [ -n "$CHANNEL_ID" ]; then
            echo "Slack Bot credentials loaded from CRDB"
          else
            echo "Slack Bot credentials not found in CRDB — will fall back to webhook"
          fi

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ steps.slack-creds.outputs.BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ steps.slack-creds.outputs.CHANNEL_ID }}
          INPUT_STATUS: ${INPUT_STATUS}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
          INPUT_PROJECT_NAME: ${INPUT_PROJECT_NAME}
          INPUT_APP_URL: ${INPUT_APP_URL}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          if [ "$INPUT_STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS_TEXT="deployed successfully"
            COLOR="#2ecc71"
          elif [ "$INPUT_STATUS" = "failure" ]; then
            EMOJI=":x:"
            STATUS_TEXT="deploy failed"
            COLOR="#e74c3c"
          elif [ "$INPUT_STATUS" = "cancelled" ]; then
            EMOJI=":no_entry_sign:"
            STATUS_TEXT="deploy cancelled"
            COLOR="#f39c12"
          else
            EMOJI=":warning:"
            STATUS_TEXT="deploy ${INPUT_STATUS}"
            COLOR="#95a5a6"
          fi

          # Build version line
          VERSION_LINE=""
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "unknown" ]; then
            VERSION_LINE="\`${INPUT_VERSION}\`"
          fi

          # Build commit message line (first line only, truncated)
          COMMIT_MSG="$INPUT_COMMIT_MESSAGE"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG="$HEAD_COMMIT_MESSAGE"
          fi
          COMMIT_LINE=$(echo "$COMMIT_MSG" | head -1 | cut -c1-100)

          # ── Try Slack Bot API first (supports threading) ──
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            # Build fields array
            FIELDS='['
            if [ -n "$VERSION_LINE" ]; then
              FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Version*\n${VERSION_LINE}\"},"
            fi
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Branch*\n\`${GH_REF_NAME}\`\"},"
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Commit*\n<${GH_COMMIT_URL}|${GH_SHA:0:7}>\"}"
            FIELDS="${FIELDS}]"

            # Build blocks
            BLOCKS='[
              {"type":"section","text":{"type":"mrkdwn","text":"'"${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"'"}},
              {"type":"section","fields":'"${FIELDS}"'}'

            # Add commit message context
            if [ -n "$COMMIT_LINE" ]; then
              COMMIT_ESCAPED=$(echo "$COMMIT_LINE" | sed 's/"/\\"/g' | sed "s/'/\\\\'/g")
              BLOCKS="${BLOCKS},"'{"type":"context","elements":[{"type":"mrkdwn","text":"'"${COMMIT_ESCAPED}"'"}]}'
            fi

            # Add app URL + actions link
            ACTIONS='{"type":"actions","elements":['
            ACTIONS_ITEMS=""
            if [ -n "${INPUT_APP_URL}" ]; then
              ACTIONS_ITEMS='{"type":"button","text":{"type":"plain_text","text":"View Site"},"url":"'"${INPUT_APP_URL}"'"}'
            fi
            ACTIONS_ITEMS="${ACTIONS_ITEMS:+${ACTIONS_ITEMS},}"'{"type":"button","text":{"type":"plain_text","text":"View Run"},"url":"'"${GH_RUN_URL}"'"}'
            ACTIONS="${ACTIONS}${ACTIONS_ITEMS}]}"
            BLOCKS="${BLOCKS},${ACTIONS}]"

            # Post initial message
            RESPONSE=$(curl -sf --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"blocks\":${BLOCKS},\"text\":\"${EMOJI} ${INPUT_PROJECT_NAME} ${STATUS_TEXT}\"}" 2>/dev/null)

            # Extract thread_ts for reply
            THREAD_TS=$(echo "$RESPONSE" | grep -oP '"ts"\s*:\s*"\K[^"]+' | head -1)

            # Post thread reply with deployment confirmation
            if [ -n "$THREAD_TS" ] && [ "${INPUT_STATUS}" = "success" ]; then
              THREAD_TEXT=":firebase: Firebase deployment confirmed for *${INPUT_PROJECT_NAME}*"
              if [ -n "$VERSION_LINE" ]; then
                THREAD_TEXT="${THREAD_TEXT} ${VERSION_LINE}"
              fi
              if [ -n "${INPUT_APP_URL}" ]; then
                THREAD_TEXT="${THREAD_TEXT}\n:globe_with_meridians: Live at <${INPUT_APP_URL}>"
              fi

              curl -sf --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"thread_ts\":\"${THREAD_TS}\",\"text\":\"$(echo "$THREAD_TEXT" | sed 's/"/\\"/g')\"}" > /dev/null 2>&1 || echo "::warning::Thread reply failed"
            fi

            echo "Sent via Slack Bot API (credentials from CRDB) with thread reply"
            exit 0
          fi

          # ── Fallback: Slack Incoming Webhook (no threading) ──
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            TEXT="${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"

            if [ -n "$VERSION_LINE" ]; then
              TEXT="${TEXT}  |  ${VERSION_LINE}"
            fi

            if [ -n "$COMMIT_LINE" ]; then
              COMMIT_ESCAPED=$(echo "$COMMIT_LINE" | sed 's/"/\\"/g')
              TEXT="${TEXT}\n> ${COMMIT_ESCAPED}"
            fi

            TEXT="${TEXT}\nBranch: \`${GH_REF_NAME}\`  |  <${GH_RUN_URL}|View run>"

            if [ -n "${INPUT_APP_URL}" ]; then
              TEXT="${TEXT}  |  <${INPUT_APP_URL}|View site>"
            fi

            curl -sf --max-time 10 -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"$(echo "$TEXT" | sed 's/"/\\"/g')\"}" || echo "::warning::Slack webhook notification failed"

            echo "Sent via Incoming Webhook (add slack_bot_token + slack_channel_id to CRDB settings for rich notifications with threading)"
          else
            echo "::warning::No Slack credentials found — skipping notification"
            echo "Add slack_bot_token + slack_channel_id to CRDB settings table, or set SLACK_WEBHOOK_URL as a GitHub secret"
          fi
