name: Deploy Notification

on:
  workflow_call:
    inputs:
      status:
        required: true
        type: string
        description: "Deploy result: success, failure, cancelled, skipped"
      project_name:
        required: true
        type: string
      app_url:
        type: string
        default: ''
      version:
        type: string
        default: ''
      commit_message:
        type: string
        default: ''
      # ── FAH rollout wait (opt-in) ───────────────────────────────────────────
      # When wait_for_fah is true, the workflow polls Firebase App Hosting for
      # the most recent rollout on the given backend until it reaches a
      # terminal state (success / failure / cancelled). The Slack notification
      # is sent AFTER that — so the message reflects the actual deploy outcome
      # rather than just "GH workflow completed".
      #
      # Requires FIREBASE_SA_KEY as an inherited secret on the calling repo.
      wait_for_fah:
        type: boolean
        default: false
      app_hosting_backend:
        type: string
        default: ''
      firebase_project_id:
        type: string
        default: ''
      fah_timeout_seconds:
        type: number
        default: 600

jobs:
  notify:
    name: Send Notification
    runs-on: ubuntu-latest

    steps:
      # ── FAH rollout wait (opt-in via inputs.wait_for_fah) ─────────────────
      # Polls Firebase App Hosting for the most recent rollout on the given
      # backend until it reaches a terminal state. Overrides the inherited
      # `status` input so Slack reflects the actual deploy outcome rather
      # than the GH workflow conclusion.
      - name: Authenticate to Google Cloud
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        if: inputs.wait_for_fah && inputs.firebase_project_id != ''
        run: npm install -g firebase-tools

      - name: Wait for FAH rollout
        id: fah-wait
        if: inputs.wait_for_fah && inputs.firebase_project_id != '' && inputs.status != 'failure'
        env:
          BACKEND: ${{ inputs.app_hosting_backend != '' && inputs.app_hosting_backend || inputs.firebase_project_id }}
          PROJECT: ${{ inputs.firebase_project_id }}
          TIMEOUT: ${{ inputs.fah_timeout_seconds }}
        run: |
          # Brief warmup so the rollout we're about to track exists in the list.
          # FAH's GitHub integration creates the rollout within a few seconds of
          # the push, but it can lag during peak hours.
          echo "Warmup: waiting 15s for FAH to enqueue the new rollout..."
          sleep 15

          # Identify the most recent rollout — the one matching this push.
          # If multiple pushes land in quick succession this could pick a
          # later one, but for solo / small-team workflows this is fine.
          ROLLOUT=$(firebase apphosting:rollouts:list "$BACKEND" \
            --project "$PROJECT" --json 2>/dev/null \
            | jq -r '.[0].name // empty')

          if [ -z "$ROLLOUT" ]; then
            echo "::warning::Could not identify FAH rollout for $BACKEND — proceeding without wait"
            echo "FAH_STATE=UNKNOWN" >> $GITHUB_OUTPUT
            echo "FAH_DURATION=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          ROLLOUT_SHORT=$(basename "$ROLLOUT")
          echo "Tracking rollout: $ROLLOUT_SHORT"

          START=$(date +%s)
          while true; do
            ELAPSED=$(($(date +%s) - START))
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::warning::FAH rollout did not finish within ${TIMEOUT}s"
              echo "FAH_STATE=TIMEOUT" >> $GITHUB_OUTPUT
              echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
              exit 0
            fi

            STATE=$(firebase apphosting:rollouts:list "$BACKEND" \
              --project "$PROJECT" --json 2>/dev/null \
              | jq -r --arg N "$ROLLOUT" '.[] | select(.name == $N) | .state // "UNKNOWN"')

            case "$STATE" in
              STATE_SUCCESS|SUCCESS|SUCCEEDED)
                echo "✓ Rollout SUCCESS in ${ELAPSED}s"
                echo "FAH_STATE=SUCCESS" >> $GITHUB_OUTPUT
                echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
                exit 0
                ;;
              STATE_FAILED|FAILED|STATE_CANCELLED|CANCELLED)
                echo "::error::Rollout finished with state $STATE after ${ELAPSED}s"
                echo "FAH_STATE=FAILED" >> $GITHUB_OUTPUT
                echo "FAH_DURATION=$ELAPSED" >> $GITHUB_OUTPUT
                exit 0
                ;;
              *)
                echo "  state=$STATE elapsed=${ELAPSED}s — waiting"
                sleep 20
                ;;
            esac
          done

      - name: Compute final status
        id: final-status
        env:
          INPUT_STATUS: ${{ inputs.status }}
          FAH_STATE: ${{ steps.fah-wait.outputs.FAH_STATE }}
        run: |
          # If FAH wait was performed, FAH outcome wins over GH workflow conclusion.
          # SUCCESS → success, FAILED → failure, anything else → pass through input.
          if [ -n "$FAH_STATE" ] && [ "$FAH_STATE" != "UNKNOWN" ]; then
            case "$FAH_STATE" in
              SUCCESS) FINAL=success ;;
              FAILED)  FINAL=failure ;;
              TIMEOUT) FINAL=timeout ;;
              *)       FINAL="$INPUT_STATUS" ;;
            esac
          else
            FINAL="$INPUT_STATUS"
          fi
          echo "STATUS=$FINAL" >> $GITHUB_OUTPUT
          echo "Final status: $FINAL (input=$INPUT_STATUS, fah=$FAH_STATE)"

      - name: Fetch Slack credentials from CRDB
        id: slack-creds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::warning::DATABASE_URL not set — cannot fetch Slack credentials from CRDB"
            echo "BOT_TOKEN=" >> $GITHUB_OUTPUT
            echo "CHANNEL_ID=" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Query settings table for slack credentials
          BOT_TOKEN=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_bot_token'" 2>/dev/null || echo "")
          CHANNEL_ID=$(psql "$DATABASE_URL" -t -A -c "SELECT value FROM settings WHERE key = 'slack_channel_id'" 2>/dev/null || echo "")

          # Mask the bot token so it doesn't appear in logs
          if [ -n "$BOT_TOKEN" ]; then
            echo "::add-mask::$BOT_TOKEN"
          fi

          echo "BOT_TOKEN=$BOT_TOKEN" >> $GITHUB_OUTPUT
          echo "CHANNEL_ID=$CHANNEL_ID" >> $GITHUB_OUTPUT

          if [ -n "$BOT_TOKEN" ] && [ -n "$CHANNEL_ID" ]; then
            echo "Slack Bot credentials loaded from CRDB"
          else
            echo "Slack Bot credentials not found in CRDB — will fall back to webhook"
          fi

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ steps.slack-creds.outputs.BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ steps.slack-creds.outputs.CHANNEL_ID }}
          INPUT_STATUS: ${{ steps.final-status.outputs.STATUS || inputs.status }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_COMMIT_MESSAGE: ${{ inputs.commit_message }}
          INPUT_PROJECT_NAME: ${{ inputs.project_name }}
          INPUT_APP_URL: ${{ inputs.app_url }}
          FAH_DURATION: ${{ steps.fah-wait.outputs.FAH_DURATION }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GH_COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        run: |
          # Format optional FAH rollout duration (set when wait_for_fah opted in)
          DURATION_SUFFIX=""
          if [ -n "$FAH_DURATION" ] && [ "$FAH_DURATION" != "0" ]; then
            MINS=$((FAH_DURATION / 60))
            SECS=$((FAH_DURATION % 60))
            if [ "$MINS" -gt 0 ]; then
              DURATION_SUFFIX=" in ${MINS}m${SECS}s"
            else
              DURATION_SUFFIX=" in ${SECS}s"
            fi
          fi

          if [ "$INPUT_STATUS" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS_TEXT="deployed successfully${DURATION_SUFFIX}"
            COLOR="#2ecc71"
          elif [ "$INPUT_STATUS" = "failure" ]; then
            EMOJI=":x:"
            STATUS_TEXT="deploy failed${DURATION_SUFFIX}"
            COLOR="#e74c3c"
          elif [ "$INPUT_STATUS" = "cancelled" ]; then
            EMOJI=":no_entry_sign:"
            STATUS_TEXT="deploy cancelled"
            COLOR="#f39c12"
          elif [ "$INPUT_STATUS" = "timeout" ]; then
            EMOJI=":hourglass:"
            STATUS_TEXT="deploy still in progress (poll timed out)"
            COLOR="#f39c12"
          else
            EMOJI=":warning:"
            STATUS_TEXT="deploy ${INPUT_STATUS}"
            COLOR="#95a5a6"
          fi

          # Build version line
          VERSION_LINE=""
          if [ -n "$INPUT_VERSION" ] && [ "$INPUT_VERSION" != "unknown" ]; then
            VERSION_LINE="\`${INPUT_VERSION}\`"
          fi

          # Build commit message line (first line only, truncated, shell-safe)
          COMMIT_MSG="${INPUT_COMMIT_MESSAGE:-$HEAD_COMMIT_MESSAGE}"
          COMMIT_LINE=$(printf '%s' "$COMMIT_MSG" | head -1 | cut -c1-100 | sed 's/["\`$\\]/\\&/g')

          # ── Try Slack Bot API first (supports threading) ──
          if [ -n "$SLACK_BOT_TOKEN" ] && [ -n "$SLACK_CHANNEL_ID" ]; then
            # Build fields array
            FIELDS='['
            if [ -n "$VERSION_LINE" ]; then
              FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Version*\n${VERSION_LINE}\"},"
            fi
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Branch*\n\`${GH_REF_NAME}\`\"},"
            FIELDS="${FIELDS}{\"type\":\"mrkdwn\",\"text\":\"*Commit*\n<${GH_COMMIT_URL}|${GH_SHA:0:7}>\"}"
            FIELDS="${FIELDS}]"

            # Build blocks
            BLOCKS='[
              {"type":"section","text":{"type":"mrkdwn","text":"'"${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"'"}},
              {"type":"section","fields":'"${FIELDS}"'}'

            # Add commit message context
            if [ -n "$COMMIT_LINE" ]; then
              COMMIT_ESCAPED=$(echo "$COMMIT_LINE" | sed 's/"/\\"/g' | sed "s/'/\\\\'/g")
              BLOCKS="${BLOCKS},"'{"type":"context","elements":[{"type":"mrkdwn","text":"'"${COMMIT_ESCAPED}"'"}]}'
            fi

            # Add app URL + actions link
            ACTIONS='{"type":"actions","elements":['
            ACTIONS_ITEMS=""
            if [ -n "${INPUT_APP_URL}" ]; then
              ACTIONS_ITEMS='{"type":"button","text":{"type":"plain_text","text":"View Site"},"url":"'"${INPUT_APP_URL}"'"}'
            fi
            ACTIONS_ITEMS="${ACTIONS_ITEMS:+${ACTIONS_ITEMS},}"'{"type":"button","text":{"type":"plain_text","text":"View Run"},"url":"'"${GH_RUN_URL}"'"}'
            ACTIONS="${ACTIONS}${ACTIONS_ITEMS}]}"
            BLOCKS="${BLOCKS},${ACTIONS}]"

            # Post initial message
            RESPONSE=$(curl -sf --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
              -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"blocks\":${BLOCKS},\"text\":\"${EMOJI} ${INPUT_PROJECT_NAME} ${STATUS_TEXT}\"}" 2>/dev/null)

            # Extract thread_ts for reply
            THREAD_TS=$(echo "$RESPONSE" | grep -oP '"ts"\s*:\s*"\K[^"]+' | head -1)

            # Post thread reply with deployment confirmation
            if [ -n "$THREAD_TS" ] && [ "${INPUT_STATUS}" = "success" ]; then
              THREAD_TEXT=":firebase: Firebase deployment confirmed for *${INPUT_PROJECT_NAME}*"
              if [ -n "$VERSION_LINE" ]; then
                THREAD_TEXT="${THREAD_TEXT} ${VERSION_LINE}"
              fi
              if [ -n "${INPUT_APP_URL}" ]; then
                THREAD_TEXT="${THREAD_TEXT}\n:globe_with_meridians: Live at <${INPUT_APP_URL}>"
              fi

              curl -sf --max-time 10 -X POST "https://slack.com/api/chat.postMessage" \
                -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"channel\":\"${SLACK_CHANNEL_ID}\",\"thread_ts\":\"${THREAD_TS}\",\"text\":\"$(echo "$THREAD_TEXT" | sed 's/"/\\"/g')\"}" > /dev/null 2>&1 || echo "::warning::Thread reply failed"
            fi

            echo "Sent via Slack Bot API (credentials from CRDB) with thread reply"
            exit 0
          fi

          # ── Fallback: Slack Incoming Webhook (no threading) ──
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            TEXT="${EMOJI} *${INPUT_PROJECT_NAME}* ${STATUS_TEXT}"

            if [ -n "$VERSION_LINE" ]; then
              TEXT="${TEXT}  |  ${VERSION_LINE}"
            fi

            if [ -n "$COMMIT_LINE" ]; then
              TEXT="${TEXT}\n> ${COMMIT_LINE}"
            fi

            TEXT="${TEXT}\nBranch: \`${GH_REF_NAME}\`  |  <${GH_RUN_URL}|View run>"

            if [ -n "${INPUT_APP_URL}" ]; then
              TEXT="${TEXT}  |  <${INPUT_APP_URL}|View site>"
            fi

            curl -sf --max-time 10 -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{\"text\":\"$(echo "$TEXT" | sed 's/"/\\"/g')\"}" || echo "::warning::Slack webhook notification failed"

            echo "Sent via Incoming Webhook (add slack_bot_token + slack_channel_id to CRDB settings for rich notifications with threading)"
          else
            echo "::warning::No Slack credentials found — skipping notification"
            echo "Add slack_bot_token + slack_channel_id to CRDB settings table, or set SLACK_WEBHOOK_URL as a GitHub secret"
          fi
