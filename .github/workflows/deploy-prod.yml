# Reusable prod-deploy workflow for Triarch projects.
# Performs a Firebase App Hosting rollout against main, then POSTs a snake_case
# promotion callback to admin's /api/releases/promoted endpoint (GATE-12).
#
# Branch-aware promotion via promote-branch.yml is Phase 4 / WORKFLOW-04 — out of scope here.

name: Deploy Production

on:
  workflow_call:
    inputs:
      firebase_project_id:
        description: 'Firebase project ID for prod (e.g. triarch-dev-website).'
        required: true
        type: string
      app_hosting_backend:
        description: 'Firebase App Hosting backend name. Defaults to firebase_project_id when empty.'
        required: false
        type: string
        default: ''
      app_url:
        description: 'Public app URL (used in deployment summary annotation only).'
        required: false
        type: string
        default: ''
      admin_callback_url:
        description: 'Base URL for admin control plane. Override for staging/test.'
        required: false
        type: string
        default: 'https://admin.triarch.dev'
    secrets:
      FIREBASE_SA_KEY:
        description: 'GCP service-account JSON key with Firebase deploy permissions.'
        required: true
      ADMIN_API_TOKEN:
        description: 'Per-project Bearer token for admin callback (valued with projects.apiKey from CRDB).'
        required: true
    outputs:
      version:
        description: 'APP_VERSION extracted from the deployed commit.'
        value: ${{ jobs.deploy.outputs.version }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    outputs:
      version: ${{ steps.version.outputs.APP_VERSION }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          # shellcheck disable=SC2086
          VER=""
          if [ -f "src/lib/version.ts" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" src/lib/version.ts | grep -oP "'[^']*'" | tr -d "'")
          elif [ -f "public/js/version.js" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" public/js/version.js | grep -oP "'[^']*'" | tr -d "'")
          elif [ -f "package.json" ]; then
            VER=$(node -p "require('./package.json').version" 2>/dev/null)
          fi
          VER="${VER:-unknown}"
          echo "APP_VERSION=$VER" >> "$GITHUB_OUTPUT"
          echo "Resolved APP_VERSION=$VER"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install project dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy via App Hosting (prod main)
        id: deploy_prod
        env:
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id }}
          APP_HOSTING_BACKEND: ${{ inputs.app_hosting_backend }}
        run: |
          BACKEND="$APP_HOSTING_BACKEND"
          [ -z "$BACKEND" ] && BACKEND="$FIREBASE_PROJECT_ID"
          echo "Rolling out main to backend $BACKEND in project $FIREBASE_PROJECT_ID (PROD)"
          firebase apphosting:rollouts:create "$BACKEND" \
            --git-branch main \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive 2>&1

      - name: Tag deployed commit
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          TAG="prod-v${APP_VERSION}-$(date -u +%Y%m%d%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$COMMIT_SHA" || true
          git push origin "$TAG" || true
          echo "Tagged: $TAG"

      - name: Deployment summary
        if: always()
        env:
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id }}
          APP_HOSTING_BACKEND: ${{ inputs.app_hosting_backend }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
          COMMIT_SHA: ${{ github.sha }}
          APP_URL: ${{ inputs.app_url }}
        run: |
          BACKEND_DISPLAY="${APP_HOSTING_BACKEND:-$FIREBASE_PROJECT_ID}"
          {
            echo "## Production Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Project | \`${FIREBASE_PROJECT_ID}\` |"
            echo "| Backend | \`${BACKEND_DISPLAY}\` |"
            echo "| Version | \`${APP_VERSION}\` |"
            echo "| Commit | \`${COMMIT_SHA}\` |"
            if [ -n "$APP_URL" ]; then
              echo "| URL | ${APP_URL} |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify admin (prod deploy)
        id: notify_admin_prod
        if: success()
        continue-on-error: true
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          ADMIN_CALLBACK_URL: ${{ inputs.admin_callback_url }}
          APP_VERSION: ${{ steps.version.outputs.APP_VERSION }}
          COMMIT_SHA: ${{ github.sha }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # Pitfall 2: Empty-token guard. GitHub Actions silently substitutes "" for missing secrets.
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "::warning::ADMIN_API_TOKEN not set on consumer repo — admin prod callback skipped. Set this Actions secret to projects.apiKey for this project."
            {
              echo "## Admin Callback (prod)"
              echo "Skipped: ADMIN_API_TOKEN not set."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # CRITICAL: snake_case payload — admin's /api/releases/promoted requires commit_sha, deployed_at, deployed_by.
          # Sending camelCase here returns HTTP 400 "Missing required field(s)" (verified in route source).
          PAYLOAD=$(printf '{"version":"%s","commit_sha":"%s","deployed_at":"%s","deployed_by":"%s"}' \
            "$APP_VERSION" \
            "$COMMIT_SHA" \
            "$DEPLOYED_AT" \
            "$GITHUB_ACTOR")

          RESP_BODY=$(mktemp)
          HTTP_CODE=$(curl -s --max-time 10 -o "$RESP_BODY" -w "%{http_code}" \
            -X POST "${ADMIN_CALLBACK_URL}/api/releases/promoted" \
            -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")

          # 201 = new promotion, 200 = idempotent repeat (both successful end states).
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Admin prod callback succeeded (HTTP $HTTP_CODE) for v${APP_VERSION}."
          else
            RESP_TEXT=$(head -c 500 "$RESP_BODY")
            echo "::warning::Admin prod callback failed (HTTP $HTTP_CODE) for v${APP_VERSION}. Response body: ${RESP_TEXT}"
          fi
          rm -f "$RESP_BODY"

          {
            echo "## Admin Callback (prod)"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Endpoint | \`${ADMIN_CALLBACK_URL}/api/releases/promoted\` |"
            echo "| HTTP Status | $HTTP_CODE |"
            echo "| Version | \`${APP_VERSION}\` |"
            echo "| Commit | \`${COMMIT_SHA}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
