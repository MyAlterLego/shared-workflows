# Verify Deploy Target — safety gate that fails CI fast if the caller repo
# doesn't match the expected app_hosting_backend. Prevents cross-app
# deploy disasters (admin CI accidentally pushing portal-prod, etc.).
#
# Usage from a consumer ci-cd.yml:
#
#   verify-target:
#     uses: triarchsecurity/shared-workflows/.github/workflows/verify-deploy-target.yml@v5
#     with:
#       expected_repository: triarchsecurity/triarchsecurity-platform
#       app_hosting_backend: triarch-dev
#
# Phase 24 / CI-01 of the deploy-safety roadmap.

name: Verify Deploy Target

on:
  workflow_call:
    inputs:
      expected_repository:
        description: 'Owner/repo string the caller must match (e.g. triarchsecurity/triarchsecurity-platform). Compared against github.repository.'
        required: true
        type: string
      app_hosting_backend:
        description: 'Backend name being deployed. Logged for audit; the assertion is on expected_repository only.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify caller is ${{ inputs.expected_repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Assert repository matches expected
        env:
          EXPECTED_REPO: ${{ inputs.expected_repository }}
          ACTUAL_REPO: ${{ github.repository }}
          BACKEND: ${{ inputs.app_hosting_backend }}
        run: |
          if [ "$ACTUAL_REPO" != "$EXPECTED_REPO" ]; then
            echo "::error::Deploy target mismatch — caller is '$ACTUAL_REPO' but expected '$EXPECTED_REPO' for backend '$BACKEND'. Refusing to deploy."
            exit 1
          fi
          echo "Verified: caller '$ACTUAL_REPO' matches expected '$EXPECTED_REPO' for backend '$BACKEND'."
          {
            echo "## Deploy Target Verified"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Caller repo | \`$ACTUAL_REPO\` |"
            echo "| Expected repo | \`$EXPECTED_REPO\` |"
            echo "| Backend | \`$BACKEND\` |"
          } >> "$GITHUB_STEP_SUMMARY"
