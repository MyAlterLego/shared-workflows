name: Deploy to Firebase

on:
  workflow_call:
    inputs:
      firebase_project_id:
        required: true
        type: string
      deploy_command:
        type: string
        default: 'apphosting'
      app_hosting_backend:
        type: string
        default: ''
      app_url:
        type: string
        default: ''
      git_branch:
        description: 'Git branch to deploy. Empty or "main" deploys main as today. Non-main triggers FAH branch rollout to the same backend URL.'
        required: false
        type: string
        default: 'main'
      admin_callback_url:
        description: 'Base URL for admin control plane (admin.triarch.dev). Override for staging/test.'
        required: false
        type: string
        default: 'https://admin.triarch.dev'
    secrets:
      FIREBASE_SA_KEY:
        required: true
      GH_PAT:
        required: false
      ADMIN_API_TOKEN:
        description: 'Per-project Bearer token for admin callback (valued with projects.apiKey from CRDB).'
        required: true
    outputs:
      version:
        description: "Extracted app version from version.ts or version.js"
        value: ${{ jobs.deploy.outputs.version }}

permissions:
  packages: read
  contents: write

jobs:
  deploy:
    name: Firebase Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.APP_VERSION }}

    env:
      GH_PAT: ${{ secrets.GH_PAT || github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT || github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          # Try version.ts first (Next.js projects), then version.js, then package.json.
          # Fall through to package.json if version.ts/js exists but grep returns empty
          # (e.g. when APP_VERSION is derived from process.env rather than a literal string).
          VER=""
          if [ -f "src/lib/version.ts" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" src/lib/version.ts | grep -oP "'[^']*'" | tr -d "'")
          elif [ -f "public/js/version.js" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" public/js/version.js | grep -oP "'[^']*'" | tr -d "'")
          fi
          if [ -z "$VER" ] && [ -f "package.json" ]; then
            VER=$(node -p "require('./package.json').version" 2>/dev/null)
          fi
          VER="${VER:-unknown}"
          echo "APP_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Extracted version: $VER"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install project dependencies
        run: npm ci || npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy via App Hosting (main branch)
        id: deploy_apphosting_main
        if: inputs.deploy_command == 'apphosting' && (inputs.git_branch == '' || inputs.git_branch == 'main')
        run: |
          BACKEND="${{ inputs.app_hosting_backend }}"
          [ -z "$BACKEND" ] && BACKEND="${{ inputs.firebase_project_id }}"
          echo "Rolling out main branch to backend $BACKEND in project ${{ inputs.firebase_project_id }}"
          firebase apphosting:rollouts:create "$BACKEND" \
            --git-branch main \
            --project ${{ inputs.firebase_project_id }} \
            --non-interactive 2>&1

      - name: Deploy via App Hosting (branch preview)
        id: deploy_apphosting_branch
        if: inputs.deploy_command == 'apphosting' && inputs.git_branch != '' && inputs.git_branch != 'main'
        run: |
          BACKEND="${{ inputs.app_hosting_backend }}"
          [ -z "$BACKEND" ] && BACKEND="${{ inputs.firebase_project_id }}"
          echo "Rolling out branch '${{ inputs.git_branch }}' to backend $BACKEND in project ${{ inputs.firebase_project_id }}"
          firebase apphosting:rollouts:create "$BACKEND" \
            --git-branch "${{ inputs.git_branch }}" \
            --project ${{ inputs.firebase_project_id }} \
            --non-interactive 2>&1

      - name: Deploy via Hosting + Functions
        if: inputs.deploy_command == 'hosting-functions'
        run: |
          firebase deploy --non-interactive --force \
            --project ${{ inputs.firebase_project_id }} 2>&1

      - name: Tag deployed commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VER="${{ steps.version.outputs.APP_VERSION }}"
          TAG="deploy-$(echo '${{ github.ref_name }}' | tr '/' '-')-${{ github.run_number }}"
          git tag "$TAG" -m "Deployed $VER from ${{ github.ref_name }} commit ${{ github.sha }}"
          git push origin "$TAG" || echo "::warning::Tag push failed — may need contents:write permission"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ inputs.firebase_project_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.APP_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: Notify admin (dev deploy)
        id: notify_admin_dev
        continue-on-error: true
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          ADMIN_CALLBACK_URL: ${{ inputs.admin_callback_url }}
        run: |
          # Pitfall 2: Empty-token guard. GitHub Actions silently substitutes "" for missing secrets.
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "::warning::ADMIN_API_TOKEN not set on consumer repo — admin callback skipped. Set this Actions secret to projects.apiKey for this project to enable release tracking."
            echo "## Admin Callback (dev)" >> $GITHUB_STEP_SUMMARY
            echo "Skipped: ADMIN_API_TOKEN not set." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Resolve branch: prefer explicit input, fall back to github.ref_name (typically 'main' for push-to-main).
          BRANCH="${{ inputs.git_branch }}"
          [ -z "$BRANCH" ] && BRANCH="${{ github.ref_name }}"

          # Construct deterministic previewUrl. For main branch we send empty (UI hides it); non-main gets the FAH URL pattern.
          PREVIEW_URL=""
          if [ "$BRANCH" != "main" ]; then
            BACKEND="${{ inputs.app_hosting_backend }}"
            [ -z "$BACKEND" ] && BACKEND="${{ inputs.firebase_project_id }}"
            SANITIZED=$(echo "$BRANCH" | tr '/' '-')
            PREVIEW_URL="https://${SANITIZED}--${BACKEND}.us-central1.hosted.app"
          fi

          # Build payload. previewUrl goes inside metadata JSONB per research §previewUrl Storage Decision (D-13).
          DEPLOYED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          if [ -n "$PREVIEW_URL" ]; then
            METADATA_JSON="{\"previewUrl\":\"${PREVIEW_URL}\"}"
          else
            METADATA_JSON="{}"
          fi
          PAYLOAD=$(printf '{"version":"%s","releaseType":"patch","env":"dev","commitSha":"%s","deployedAt":"%s","releasedBy":"%s","branch":"%s","metadata":%s}' \
            "${{ steps.version.outputs.APP_VERSION }}" \
            "${{ github.sha }}" \
            "$DEPLOYED_AT" \
            "${{ github.actor }}" \
            "$BRANCH" \
            "$METADATA_JSON")

          # POST + capture body and code separately so a 400 surfaces the error string in the workflow log.
          RESP_BODY=$(mktemp)
          HTTP_CODE=$(curl -s --max-time 10 -o "$RESP_BODY" -w "%{http_code}" \
            -X POST "${ADMIN_CALLBACK_URL}/api/platform/ingest/release-logs" \
            -H "Authorization: Bearer ${ADMIN_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" || echo "000")

          if [ "$HTTP_CODE" = "201" ]; then
            echo "Admin dev callback succeeded (HTTP 201). release_logs row created for ${BRANCH} v${{ steps.version.outputs.APP_VERSION }}."
          else
            RESP_TEXT=$(head -c 500 "$RESP_BODY")
            echo "::warning::Admin dev callback failed (HTTP $HTTP_CODE) for ${BRANCH} v${{ steps.version.outputs.APP_VERSION }}. Response body: ${RESP_TEXT}"
          fi
          rm -f "$RESP_BODY"

          echo "## Admin Callback (dev)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Endpoint | \`${ADMIN_CALLBACK_URL}/api/platform/ingest/release-logs\` |" >> $GITHUB_STEP_SUMMARY
          echo "| HTTP Status | $HTTP_CODE |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`$BRANCH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ steps.version.outputs.APP_VERSION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ -n "$PREVIEW_URL" ]; then
            echo "| Preview URL | $PREVIEW_URL |" >> $GITHUB_STEP_SUMMARY
          fi
