name: Deploy to Firebase

on:
  workflow_call:
    inputs:
      firebase_project_id:
        required: true
        type: string
      deploy_command:
        type: string
        default: 'apphosting'
      app_hosting_backend:
        type: string
        default: ''
      app_url:
        type: string
        default: ''
    outputs:
      version:
        description: "Extracted app version from version.ts or version.js"
        value: ${{ jobs.deploy.outputs.version }}

permissions:
  packages: read
  contents: write

jobs:
  deploy:
    name: Firebase Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.APP_VERSION }}

    env:
      GH_PAT: ${{ secrets.GH_PAT || github.token }}
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT || github.token }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          # Try version.ts first (Next.js projects), then version.js, then package.json
          if [ -f "src/lib/version.ts" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" src/lib/version.ts | grep -oP "'[^']*'" | tr -d "'")
          elif [ -f "public/js/version.js" ]; then
            VER=$(grep -oP "APP_VERSION\s*=\s*'[^']*'" public/js/version.js | grep -oP "'[^']*'" | tr -d "'")
          elif [ -f "package.json" ]; then
            VER=$(node -p "require('./package.json').version" 2>/dev/null)
          fi
          VER="${VER:-unknown}"
          echo "APP_VERSION=$VER" >> $GITHUB_OUTPUT
          echo "Extracted version: $VER"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install project dependencies
        run: npm ci || npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy via App Hosting
        if: inputs.deploy_command == 'apphosting'
        run: |
          BACKEND="${{ inputs.app_hosting_backend }}"
          [ -z "$BACKEND" ] && BACKEND="${{ inputs.firebase_project_id }}"
          firebase apphosting:rollouts:create "$BACKEND" \
            --git-branch main \
            --project ${{ inputs.firebase_project_id }} \
            --non-interactive 2>&1 || echo "::warning::Rollout trigger returned non-zero"

      - name: Deploy via Hosting + Functions
        if: inputs.deploy_command == 'hosting-functions'
        run: |
          firebase deploy --non-interactive --force \
            --project ${{ inputs.firebase_project_id }} 2>&1

      - name: Tag deployed commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VER="${{ steps.version.outputs.APP_VERSION }}"
          TAG="deploy-$(echo '${{ github.ref_name }}' | tr '/' '-')-${{ github.run_number }}"
          git tag "$TAG" -m "Deployed $VER from ${{ github.ref_name }} commit ${{ github.sha }}"
          git push origin "$TAG" || echo "::warning::Tag push failed — may need contents:write permission"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Project | ${{ inputs.firebase_project_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.APP_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
