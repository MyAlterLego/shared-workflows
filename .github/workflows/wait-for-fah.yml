name: Wait for Firebase App Hosting Rollout

# Polls Firebase App Hosting for the rollout matching the caller's commit SHA
# until it reaches a terminal state (SUCCEEDED / FAILED / CANCELLED) or the
# timeout elapses.
#
# Use this as a `deploy:` job in a caller's ci-cd.yml when the actual deploy
# is performed by FAH's connected-repo auto-deploy (Pattern A) and you want
# the deploy step to be visible in the GitHub Actions pipeline graph.
# This is OBSERVABILITY only — it doesn't run `firebase deploy`. FAH does.
#
# Implementation note (2026-05-17): The earlier version of this workflow used
# `firebase apphosting:rollouts:list` which IS NOT A VALID FIREBASE CLI
# COMMAND (only `apphosting:backends:list/get` and `apphosting:rollouts:create`
# exist). The list call always failed silently, the script swallowed the
# error with `|| echo "[]"`, parsed empty JSON, computed state=UNKNOWN, and
# exited 5 — making every successful FAH deploy look like a CI failure.
# This rewrite calls the FAH REST API directly (same endpoint used by the
# Firebase Console). It also matches the rollout to the caller's commit SHA
# via the build resource's source.codebase.hash so parallel deploys don't
# confuse each other.
#
# Caller pattern:
#   jobs:
#     quality-gate: { uses: shared-workflows/quality-gate.yml@v9.0, ... }
#     deploy:
#       needs: quality-gate
#       if: github.event_name == 'push'
#       uses: triarchsecurity/shared-workflows/.github/workflows/wait-for-fah.yml@v1
#       with:
#         firebase_project_id: <gcp-project-id>
#         app_hosting_backend: <fah-backend-name>
#       secrets: inherit
#     notify:
#       needs: [quality-gate, deploy]
#       if: always() && github.event_name == 'push'
#       uses: triarchsecurity/shared-workflows/.github/workflows/notify.yml@v1
#       with:
#         status: ${{ needs.deploy.result }}
#         ...
#       secrets: inherit

on:
  workflow_call:
    inputs:
      firebase_project_id:
        required: true
        type: string
        description: 'GCP project ID (e.g. triarch-dev-tmi)'
      app_hosting_backend:
        required: true
        type: string
        description: 'FAH backend name (e.g. tmi)'
      location:
        type: string
        default: 'us-central1'
        description: 'FAH backend region'
      timeout_seconds:
        type: number
        default: 600
        description: 'Max time to wait for FAH rollout to reach terminal state'
      poll_interval_seconds:
        type: number
        default: 15
        description: 'How often to poll FAH for rollout state'
      match_commit:
        type: boolean
        default: true
        description: 'When true, only consider rollouts whose build was triggered by github.sha. When false, take the most recent rollout regardless of commit.'
    secrets:
      FIREBASE_SA_KEY:
        required: true
        description: 'GCP service-account JSON for Firebase auth'
    outputs:
      rollout_status:
        description: 'Final FAH rollout state: success / failure / cancelled / timeout / no_rollout / unknown'
        value: ${{ jobs.wait.outputs.status }}
      rollout_duration_seconds:
        description: 'Wall-clock seconds spent polling'
        value: ${{ jobs.wait.outputs.duration }}
      rollout_name:
        description: 'Final FAH rollout resource name (e.g. rollout-2026-05-17-006). Empty when no rollout matched.'
        value: ${{ jobs.wait.outputs.rollout }}

permissions:
  contents: read

jobs:
  wait:
    name: Wait for FAH Rollout
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      status: ${{ steps.poll.outputs.STATUS }}
      duration: ${{ steps.poll.outputs.DURATION }}
      rollout: ${{ steps.poll.outputs.ROLLOUT }}

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Poll FAH REST API for rollout completion
        id: poll
        env:
          FIREBASE_PROJECT_ID: ${{ inputs.firebase_project_id }}
          FAH_BACKEND: ${{ inputs.app_hosting_backend }}
          FAH_LOCATION: ${{ inputs.location }}
          TIMEOUT_SECONDS: ${{ inputs.timeout_seconds }}
          POLL_INTERVAL: ${{ inputs.poll_interval_seconds }}
          MATCH_COMMIT: ${{ inputs.match_commit }}
          GH_SHA: ${{ github.sha }}
        run: |
          # GitHub Actions invokes this as `bash -e {0}` by default, which means
          # `set -e` is on. Inside command substitution (`TOKEN=$(gcloud ...)`)
          # any non-zero exit code kills the script silently — observed as a
          # 1.9-second-and-out failure with no diagnostic output. Explicitly
          # disable set -e here; we want to inspect command outputs and decide
          # control flow ourselves (this loop is supposed to TOLERATE transient
          # gcloud/API failures and keep polling).
          set +e
          set -uo pipefail
          START=$(date +%s)
          DEADLINE=$((START + TIMEOUT_SECONDS))
          BASE="https://firebaseapphosting.googleapis.com/v1beta/projects/${FIREBASE_PROJECT_ID}/locations/${FAH_LOCATION}/backends/${FAH_BACKEND}"

          echo "Watching FAH backend '${FAH_BACKEND}' on project '${FIREBASE_PROJECT_ID}' (region ${FAH_LOCATION})"
          if [ "${MATCH_COMMIT}" = "true" ]; then
            echo "Matching rollouts whose build source.codebase.hash == ${GH_SHA}"
          else
            echo "Matching the most recent rollout (no commit filter)"
          fi
          echo "Timeout: ${TIMEOUT_SECONDS}s; poll interval: ${POLL_INTERVAL}s"
          echo ""

          STATUS="unknown"
          ROLLOUT_NAME=""
          # Cache build→commit lookups across polls to avoid hammering the API
          BUILD_CACHE=$(mktemp)

          # Print env diagnostics ONCE before the loop — invaluable when this fails in CI.
          echo "gcloud version: $(gcloud --version 2>&1 | head -1)"
          echo "GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-(unset)}"
          echo ""

          while true; do
            # google-github-actions/auth@v2 writes a JSON key file and points
            # GOOGLE_APPLICATION_CREDENTIALS at it (Application Default Credentials).
            # `gcloud auth print-access-token` uses gcloud's own auth list (different
            # mechanism) and returns empty in this environment. Use ADC explicitly,
            # with the legacy form as a defensive fallback for any future runner change.
            TOKEN=$(gcloud auth application-default print-access-token 2>&1)
            TOKEN_RC=$?
            if [ $TOKEN_RC -ne 0 ] || [ -z "${TOKEN}" ] || echo "${TOKEN}" | grep -qi "error"; then
              echo "::warning::application-default token fetch failed (rc=$TOKEN_RC), trying gcloud auth print-access-token"
              TOKEN=$(gcloud auth print-access-token 2>&1)
              TOKEN_RC=$?
            fi
            if [ $TOKEN_RC -ne 0 ] || [ -z "${TOKEN}" ] || echo "${TOKEN}" | grep -qi "error"; then
              echo "::error::Failed to obtain gcloud access token (rc=$TOKEN_RC). Output: ${TOKEN:0:200}"
              STATUS="unknown"
              break
            fi

            # Fetch up to 50 rollouts; sort client-side by createTime DESC.
            # FAH API does not guarantee ordering in the list response.
            ROLLOUTS=$(curl -sS --max-time 30 \
              -H "Authorization: Bearer ${TOKEN}" \
              "${BASE}/rollouts?pageSize=50" 2>/dev/null || echo '{"rollouts":[]}')

            # Pick a candidate rollout:
            #   - If MATCH_COMMIT=true: find the most recent rollout whose build's source.codebase.hash == GH_SHA
            #   - Otherwise: the most recent rollout regardless of commit
            # Strategy: list candidates from most recent down, fetch each build once to learn commit.
            CANDIDATE=$(echo "${ROLLOUTS}" | jq -r '
              (.rollouts // [])
              | sort_by(.createTime) | reverse
              | .[] | [.name, .state, .build, .createTime] | @tsv
            ' 2>/dev/null)

            STATE=""
            ROLLOUT_NAME=""
            ROLLOUT_BUILD=""
            ROLLOUT_CREATE=""

            if [ -z "${CANDIDATE}" ]; then
              echo "[t+$(( $(date +%s) - START ))s] No rollouts found yet"
            else
              while IFS=$'\t' read -r NAME ST BUILD CT; do
                [ -z "${NAME}" ] && continue
                if [ "${MATCH_COMMIT}" = "true" ]; then
                  # Look up this build's commit SHA (cached)
                  CACHED=$(grep -m1 "^${BUILD}	" "${BUILD_CACHE}" 2>/dev/null | cut -f2)
                  if [ -z "${CACHED}" ]; then
                    BUILD_NAME=$(basename "${BUILD}")
                    BUILD_JSON=$(curl -sS --max-time 15 \
                      -H "Authorization: Bearer ${TOKEN}" \
                      "${BASE}/builds/${BUILD_NAME}" 2>/dev/null || echo '{}')
                    SHA=$(echo "${BUILD_JSON}" | jq -r '.source.codebase.hash // empty' 2>/dev/null)
                    CACHED="${SHA:-NONE}"
                    echo "${BUILD}	${CACHED}" >> "${BUILD_CACHE}"
                  fi
                  if [ "${CACHED}" = "${GH_SHA}" ]; then
                    STATE="${ST}"
                    ROLLOUT_NAME=$(basename "${NAME}")
                    ROLLOUT_BUILD="${BUILD}"
                    ROLLOUT_CREATE="${CT}"
                    break
                  fi
                else
                  # No commit filter — take the first (most recent)
                  STATE="${ST}"
                  ROLLOUT_NAME=$(basename "${NAME}")
                  ROLLOUT_BUILD="${BUILD}"
                  ROLLOUT_CREATE="${CT}"
                  break
                fi
              done <<< "${CANDIDATE}"
            fi

            NOW=$(date +%s)
            ELAPSED=$((NOW - START))

            if [ -z "${STATE}" ]; then
              echo "[t+${ELAPSED}s] No matching rollout for commit ${GH_SHA:0:8} yet (FAH may not have started the build)"
            else
              echo "[t+${ELAPSED}s] ${ROLLOUT_NAME} state=${STATE} (created ${ROLLOUT_CREATE})"
            fi

            case "${STATE}" in
              READY|SUCCEEDED)
                STATUS="success"
                break ;;
              FAILED)
                STATUS="failure"
                break ;;
              CANCELLED)
                STATUS="cancelled"
                break ;;
              # PENDING, BUILDING, DEPLOYING, "" (no match yet) — keep polling
              *) ;;
            esac

            if [ "${NOW}" -ge "${DEADLINE}" ]; then
              if [ -z "${STATE}" ]; then
                STATUS="no_rollout"
                echo "::warning::No FAH rollout for commit ${GH_SHA} appeared within ${TIMEOUT_SECONDS}s. Backend may not be wired to this branch in Firebase Console."
              else
                STATUS="timeout"
                echo "::warning::FAH polling timed out after ${TIMEOUT_SECONDS}s; last state=${STATE}"
              fi
              break
            fi

            sleep "${POLL_INTERVAL}"
          done

          DURATION=$(( $(date +%s) - START ))
          echo ""
          echo "Final FAH rollout status: ${STATUS} (after ${DURATION}s)"
          [ -n "${ROLLOUT_NAME}" ] && echo "Matched rollout: ${ROLLOUT_NAME}"

          {
            echo "STATUS=${STATUS}"
            echo "DURATION=${DURATION}"
            echo "ROLLOUT=${ROLLOUT_NAME}"
          } >> "${GITHUB_OUTPUT}"

          # Optional summary for the Actions UI
          {
            echo "## FAH Rollout Watch"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Backend | \`${FAH_BACKEND}\` |"
            echo "| Project | \`${FIREBASE_PROJECT_ID}\` |"
            echo "| Commit | \`${GH_SHA:0:12}\` |"
            echo "| Rollout | \`${ROLLOUT_NAME:-(none)}\` |"
            echo "| Status | **${STATUS}** |"
            echo "| Duration | ${DURATION}s |"
          } >> "${GITHUB_STEP_SUMMARY:-/dev/null}"

          # Fail the job on non-success terminal states so the pipeline graph turns red.
          # `notify` job downstream uses `if: always()` so it still fires.
          case "${STATUS}" in
            success) exit 0 ;;
            *)       exit 1 ;;
          esac
